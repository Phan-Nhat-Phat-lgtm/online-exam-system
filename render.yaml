services:
  - type: web
    name: exam-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python create_admin.py
    startCommand: |
      cd backend
      gunicorn exam_system.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: exam-db
          property: connectionString
      - key: RENDER
        value: "true"

  - type: web
    name: exam-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://exam-backend.onrender.com/api

databases:
  - name: exam-db
    databaseName: exam_db
    user: exam_user
    plan: free
    region: singapore
